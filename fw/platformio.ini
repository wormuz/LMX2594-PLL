; PlatformIO build for LMX259X-PLL new firmware (STM32F103C8T6).
; Bare-metal CMSIS (no Arduino/HAL). Provides device header, startup, linker.
[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = cmsis
extra_scripts = pre:version.py
build_flags =
    -Iinc
    -Os -Wall -ffunction-sections -fdata-sections
    -DSTM32F103xB
build_src_filter = +<*>
